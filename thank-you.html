<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Received — The Wakeford Hotel Mysteries</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#000000;
    --soft:#1c1c1c;
    --mid:#4a4a4a;
    --muted:#777777;
    --hair:#d8d3ca;
    --paper:#faf7f2;
  }
  *{box-sizing:border-box;}
  html, body{
    margin:0;
    padding:0;
    height:100%;
    border:0;
  }
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--paper);
    color:var(--soft);
    font-family:'Lora',serif;
    line-height:1.65;
  }
  .wrap{
    width:100%;
    max-width:520px;
    margin:0 auto;
    padding:48px 24px;
    text-align:center;
  }
  .diamond{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin:18px 0 30px;
  }
  .diamond .line{ height:1px; width:56px; background:var(--mid); }
  .diamond .dot{ width:7px; height:7px; background:var(--mid); transform:rotate(45deg); }
  h1{
    font-weight:600;
    font-size:28px;
    margin:0 0 4px;
    color:var(--ink);
  }
  p{
    font-size:15.5px;
    color:var(--mid);
    max-width:440px;
    margin:0 auto 8px;
  }
  .sig{
    margin-top:36px;
    font-size:13px;
    color:var(--mid);
  }
  .sig .name{
    font-weight:600;
    color:var(--ink);
    display:block;
    margin-top:4px;
    font-size:14px;
  }
  .back{
    display:inline-block;
    margin-top:48px;
    font-size:12.5px;
    letter-spacing:1px;
    margin-right:-1px;
    color:var(--muted);
    text-decoration:none;
  }
</style>
</head>
<body>
<div class="wrap">

  <h1>Received</h1>
  <div class="diamond"><div class="line"></div><div class="dot"></div><div class="line"></div></div>
  <p>Your record has reached me. I keep every one that comes in — I'll be in touch.</p>

  <div class="sig">
    With the patience this work demands,
    <span class="name">The Night Manager</span>
  </div>

  <a class="back" href="index.html">&larr; Back to the Register</a>

</div>
</body>
</html>
